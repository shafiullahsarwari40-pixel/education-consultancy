<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Upload Preview</title>
  <link rel="stylesheet" href="/styles_new.css">
</head>
<body>
  <div style="max-width:1100px;margin:3rem auto;padding:1rem;">
    <h1 style="color:#001f5c;margin-bottom:1rem;">Documents Upload Preview</h1>
    <p style="color:#6b7280;margin-bottom:1.5rem;">This is a standalone preview of the redesigned upload cards (static sample).</p>

    <div class="file-upload-grid">
      <div class="file-upload-card selected">
        <div class="card-top">
          <div class="file-upload-icon">🛂</div>
          <div class="file-upload-title">Passport</div>
        </div>
        <div class="card-body">
          <div class="file-preview">passport.pdf</div>
        </div>
        <div class="card-footer">
          <button class="button button-outline upload-btn">Change</button>
          <button class="button button-secondary remove-btn">Remove</button>
        </div>
      </div>

      <div class="file-upload-card">
        <div class="card-top">
          <div class="file-upload-icon">📄</div>
          <div class="file-upload-title">Diploma</div>
        </div>
        <div class="card-body">
          <div class="file-placeholder">No file uploaded</div>
        </div>
        <div class="card-footer">
          <button class="button button-outline upload-btn">Upload</button>
        </div>
      </div>

      <div class="file-upload-card">
        <div class="card-top">
          <div class="file-upload-icon">📑</div>
          <div class="file-upload-title">Transcript</div>
        </div>
        <div class="card-body">
          <div class="file-placeholder">No file uploaded</div>
        </div>
        <div class="card-footer">
          <button class="button button-outline upload-btn">Upload</button>
        </div>
      </div>

      <div class="file-upload-card">
        <div class="card-top">
          <div class="file-upload-icon">🖼️</div>
          <div class="file-upload-title">Photo</div>
        </div>
        <div class="card-body">
          <div class="file-placeholder">No file uploaded</div>
        </div>
        <div class="card-footer">
          <button class="button button-outline upload-btn">Upload</button>
        </div>
      </div>

      <div class="file-upload-card">
        <div class="card-top">
          <div class="file-upload-icon">🪪</div>
          <div class="file-upload-title">Residence Card</div>
        </div>
        <div class="card-body">
          <div class="file-placeholder">No file uploaded</div>
        </div>
        <div class="card-footer">
          <button class="button button-outline upload-btn">Upload</button>
        </div>
      </div>

      <div class="file-upload-card">
        <div class="card-top">
          <div class="file-upload-icon">📂</div>
          <div class="file-upload-title">Other Documents</div>
        </div>
        <div class="card-body">
          <div class="file-placeholder">No file uploaded</div>
        </div>
        <div class="card-footer">
          <button class="button button-outline upload-btn">Upload</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
